<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>KONA BOT</title>

<style>

body{
    font-family: Arial;
    max-width: 900px;
    margin: 30px auto;
}

#chat{
    border:1px solid #ccc;
    height:500px;
    overflow-y:auto;
    padding:15px;
    margin-bottom:10px;
}

.usuario{
    margin:10px 0;
}

.bot{
    margin:10px 0;
}

input{
    width:80%;
    padding:10px;
}

button{
    padding:10px;
}

</style>

</head>

<body>

<h1>☕ KONA BOT</h1>

<div id="chat"></div>

<input
id="mensaje"
placeholder="Escribe tu mensaje..."
>

<button onclick="enviar()">
Enviar
</button>

<script>

async function enviar(){

    const mensaje =
    document.getElementById("mensaje").value;

    if(!mensaje) return;

    const chat =
    document.getElementById("chat");

    chat.innerHTML +=
    `<div class="usuario">
        <b>Tú:</b> ${mensaje}
    </div>`;

    document.getElementById("mensaje").value="";

    const respuesta =
    await fetch("/chat",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            mensaje
        })

    });

    const data =
    await respuesta.json();

    let htmlBot = `
<div class="bot">
    <b>KONA BOT:</b> ${data.respuesta}
</div>
`;

if (data.pdf) {

    htmlBot += `
    <div class="bot">
      <a
  href="${data.pdf}"
  target="_blank"
  style="
    display:inline-block;
    background:#6F4E37;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    text-decoration:none;
    margin-top:8px;
  "
>
📄 Ver menú completo
</a>
    </div>
    `;

}

chat.innerHTML += htmlBot;

    chat.scrollTop =
    chat.scrollHeight;
}

</script>

</body>
</html>
