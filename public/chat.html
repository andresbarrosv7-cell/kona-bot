<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>KONA BOT</title>

<style>

body{
    font-family: Arial;
    max-width: 900px;
    margin: 30px auto;
}

#chat{
    border:1px solid #ccc;
    height:500px;
    overflow-y:auto;
    padding:15px;
    margin-bottom:10px;
}

.usuario{
    margin:10px 0;
}

.bot{
    margin:10px 0;
}

input{
    width:80%;
    padding:10px;
}

button{
    padding:10px;
}

</style>

</head>

<body>

<h1>☕ KONA BOT</h1>

<div id="chat"></div>

<input
id="mensaje"
placeholder="Escribe tu mensaje..."
>

<button onclick="enviar()">
Enviar
</button>

<script>

async function enviar(){

    const mensaje =
    document.getElementById("mensaje").value;

    if(!mensaje) return;

    const chat =
    document.getElementById("chat");

    chat.innerHTML +=
    `<div class="usuario">
        <b>Tú:</b> ${mensaje}
    </div>`;

    document.getElementById("mensaje").value="";

    const respuesta =
    await fetch("/chat",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            mensaje
        })

    });

    const data =
    await respuesta.json();

    chat.innerHTML +=
    `<div class="bot">
        <b>KONA BOT:</b> ${data.respuesta}
    </div>`;

    chat.scrollTop =
    chat.scrollHeight;
}

</script>

</body>
</html>
